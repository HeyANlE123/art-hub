<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>美工区作品欣赏库</title>
    <script src="https://cdn.staticfile.org/vue/3.3.4/vue.global.prod.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        body { font-family: -apple-system, system-ui, sans-serif; background-color: #f8fafc; }
        .sticky-top { position: sticky; top: 0; z-index: 50; background: rgba(255,255,255,0.95); backdrop-filter: blur(8px); }
    </style>
</head>
<body>
    <div id="app" class="max-w-md mx-auto min-h-screen flex flex-col relative">
        
        <div class="bg-white px-4 pt-4 pb-2 border-b border-slate-50">
            <div class="flex bg-slate-100 p-1 rounded-xl mb-3">
                <button v-for="g in ['小班', '中班', '大班']" :key="g"
                    @click="activeGrade = g"
                    :class="['flex-1 py-1.5 text-xs font-bold rounded-lg transition-all', activeGrade === g ? 'bg-white text-emerald-600 shadow-sm' : 'text-slate-400']">
                    {{g}}
                </button>
            </div>
            <div class="flex items-center justify-between">
                <div class="flex gap-4">
                    <button v-for="s in ['上学期', '下学期']" :key="s"
                        @click="activeSemester = s"
                        :class="['text-sm font-bold flex items-center transition-colors', activeSemester === s ? 'text-slate-800' : 'text-slate-300']">
                        {{s}}<div v-if="activeSemester === s" class="w-1 h-1 bg-emerald-500 rounded-full ml-1"></div>
                    </button>
                </div>
                <div class="bg-slate-100 p-1.5 rounded-full text-slate-400"><svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg></div>
            </div>
        </div>

        <div class="sticky-top border-b border-slate-100 px-4 py-2.5 flex gap-2 overflow-x-auto no-scrollbar">
            <button v-for="d in dimensions" :key="d.name"
                @click="activeDimension = d.name"
                :class="['flex items-center gap-2 px-4 py-1.5 rounded-xl whitespace-nowrap border transition-all text-xs font-bold', 
                         activeDimension === d.name ? `bg-${d.color}-500 border-${d.color}-500 text-white shadow-md` : 'bg-white border-slate-100 text-slate-400']">
                {{d.name}}
            </button>
        </div>

        <div class="flex-1 p-4 space-y-4 pb-24">
            <div v-for="work in filteredWorks" :key="work.title" class="bg-white rounded-3xl overflow-hidden border border-slate-100 shadow-sm">
                <img :src="work.img" class="w-full h-40 object-cover">
                <div class="p-4">
                    <h3 class="text-base font-black text-slate-800 mb-2 tracking-tight">《{{work.title}}》- {{work.author}}</h3>
                    <div class="mb-3 bg-emerald-50 p-2.5 rounded-xl border-l-2 border-emerald-400">
                        <p class="text-[10px] text-emerald-800 leading-relaxed font-medium">{{work.experience}}</p>
                    </div>
                    <div class="space-y-1">
                        <div v-for="(g, i) in work.guide" :key="i" class="text-[11px] text-slate-500 pl-2 border-l border-slate-200 py-0.5">{{g}}</div>
                    </div>
                    <div v-if="work.feedback" class="mt-3 pt-3 border-t border-slate-50 text-[10px] text-orange-400 italic">“{{work.feedback}}”</div>
                </div>
            </div>
            <div v-if="filteredWorks.length === 0" class="text-center py-20 text-slate-300 text-xs">该维度暂无内容，请切换试试</div>
        </div>

        <div class="fixed bottom-0 left-0 right-0 bg-white/90 backdrop-blur-md border-t border-slate-100 py-2 flex justify-around items-center px-10">
            <div class="flex flex-col items-center gap-0.5 text-emerald-600">
                <div class="w-5 h-5 bg-emerald-500 rounded-md"></div>
                <span class="text-[8px] font-bold">资源库</span>
            </div>
            <div class="w-10 h-10 bg-emerald-500 rounded-full -mt-8 border-4 border-white shadow-lg text-white flex items-center justify-center font-bold text-xl">+</div>
            <div class="flex flex-col items-center gap-0.5 text-slate-300">
                <div class="w-5 h-5 bg-slate-200 rounded-md"></div>
                <span class="text-[8px] font-bold">我的</span>
            </div>
        </div>
    </div>

    <script>
        const { createApp, ref, computed } = Vue;
        createApp({
            setup() {
                const activeGrade = ref('小班');
                const activeSemester = ref('上学期');
                const activeDimension = ref('审美感知');
                const dimensions = [{name:'审美感知',color:'blue'},{name:'审美想象',color:'purple'},{name:'审美情感',color:'pink'}];
                
                const database = ref([
                    {
                        grade: '小班', semester: '上学期', dimension: '审美感知', category: '西洋画',
                        title: '太阳', author: '胡安·米罗',
                        experience: '辨认颜色名称，说出不同颜色；欣赏鲜明色彩和简单造型。',
                        guide: ['你看画里用了哪些颜色？', '线条像什么？', '哪个形状像太阳？'],
                        feedback: '老师，那个黄黄的像蛋黄！',
                        img: 'https://images.unsplash.com/photo-1579783902614-a3fb3927b6a5?q=80&w=400'
                    },
                    {
                        grade: '小班', semester: '上学期', dimension: '审美想象', category: '中国画',
                        title: '虾', author: '齐白石',
                        experience: '形象动态：感受虾在水里游动的样子，体会线条的飘逸。',
                        guide: ['小虾在水里做什么呢？', '它们的胡须长不长？'],
                        feedback: '这只虾胡子好长，像老爷爷。',
                        img: 'https://images.unsplash.com/photo-1594122230689-45899d9e6f69?q=80&w=400'
                    }
                ]);

                const filteredWorks = computed(() => {
                    return database.value.filter(item => 
                        item.grade === activeGrade.value &&
                        item.semester === activeSemester.value &&
                        item.dimension === activeDimension.value
                    );
                });

                return { activeGrade, activeSemester, activeDimension, dimensions, filteredWorks };
            }
        }).mount('#app');
    </script>
</body>
</html>
